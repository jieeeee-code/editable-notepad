<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>扫码验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 系统无衬线字体，匹配微信原生页面字体 */
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f6f6f6;
            color: #222222;
            max-width: 750px;
            margin: 0 auto;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* 顶部导航栏 */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 18px 14px;
            background: #ffffff;
        }
        .back-icon {
            position: absolute;
            left: 14px;
            font-size: 24px;
            color: #222;
            text-decoration: none;
        }
        .page-title {
            font-size: 22px;
            font-weight: 500;
            color: #111;
        }

        /* 校徽标题区域 */
        .logo-header {
            background: #fff;
            padding: 22px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        /* 福州大学真实校徽 */
        .fzu-logo {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .fzu-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            display: block;
        }
        .logo-main-text {
            font-size: 28px;
            font-weight: 500;
            color: #1a1a1a;
        }

        /* 标题下方不再展示横幅图片，保持页面白底简洁 */
        .banner-library {
            display: none;
        }

        /* 主查询卡片容器 */
        .result-wrap {
            margin: 22px 14px;
            background: #fff;
            border-radius: 2px;
            overflow: hidden;
        }
        /* 卡片顶部蓝色标题栏：使用参考图柔和蓝色，无边框 */
        .card-head {
            background-color: #3E4D80;
            color: #ffffff;
            padding: 14px 18px;
            font-size: 18px;
            font-weight: 500;
            border: none;
        }

        /* 表格行 两栏布局 严格左右分割线 */
        .table-row {
            display: grid;
            grid-template-columns: 130px 1fr;
            border-bottom: 1px solid #eeeeee;
        }
        /* 最后一行无下边框 */
        .table-row:last-child {
            border-bottom: none;
        }
        /* 左侧标签栏 浅灰底色 */
        .table-left {
            padding: 16px 18px;
            background-color: #f8f8f8;
            font-size: 16px;
            color: #333333;
            border-right: 1px solid #eee;
        }
        /* 右侧内容栏 */
        .table-right {
            padding: 16px 18px;
            font-size: 16px;
            color: #111111;
            word-break: break-all;
        }

        /* 数据核实 证明预览区域 */
        .proof-preview-box {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            background: #fafafa;
        }
        .proof-paper {
            width: 88%;
            height: 340px;
            position: relative;
            overflow: hidden;
            background: #fff;
            border: 1px solid #ddd;
        }
        /* 原图完整斜向水印文字：仅供内容预览核验 */
        .paper-watermark {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: repeating-linear-gradient(
                42deg,
                transparent,
                transparent 70px,
                rgba(100, 100, 100, 0.11) 70px,
                rgba(100, 100, 100, 0.11) 130px
            );
            background-size: 160px 160px;
            background-repeat: repeat;
            pointer-events: none;
            z-index: 1;
        }
        .paper-watermark::after {
            content: "仅供内容预览核验";
            position: absolute;
            width: 100%;
            height: 100%;
            font-size: 14px;
            color: #666;
            opacity: 0.12;
            transform: rotate(-42deg);
            white-space: nowrap;
            line-height: 160px;
            letter-spacing: 2px;
        }
        /* 证明内部模拟图（支持替换真实图片） */
        .paper-inner {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
        }
        .paper-inner .proof-real-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 0;
        }
        .paper-seal-red {
            width: 76px;
            height: 76px;
            border: 2px solid #c8102e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8102e;
            font-size: 12px;
            text-align: center;
            position: relative;
            z-index: 3;
        }
        .qrcode-demo {
            width: 44px;
            height: 44px;
            background: #222;
            position: relative;
            z-index: 3;
        }

        /* 查询结果绿色文字区域 精准色值 #00A846 */
        .success-text-box {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00A846;
            font-size: 16px;
            flex-wrap: wrap;
        }
        .green-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #00C050;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            flex-shrink: 0;
        }
        /* 查询失败样式 */
        .fail-text-box {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c8102e;
            font-size: 16px;
            flex-wrap: wrap;
        }
        .red-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #c8102e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            flex-shrink: 0;
        }
        .loading-text-box {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
            font-size: 16px;
        }
        .gray-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* 底部联系电话 */
        .tel-notice {
            text-align: center;
            padding: 20px 16px;
            font-size: 17px;
            color: #111;
        }
        /* 页面最底部技术支持 */
        .footer-info {
            text-align: center;
            padding: 10px 16px 30px;
            font-size: 16px;
            color: #707070;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 480px) {
            .page-title { font-size: 18px; }
            .back-icon { font-size: 20px; }
            .logo-header { padding: 16px 12px; gap: 10px; }
            .fzu-logo { width: 52px; height: 52px; }
            .logo-main-text { font-size: 22px; }
            .result-wrap { margin: 14px 8px; }
            .card-head { font-size: 16px; padding: 10px 14px; }
            .table-row { grid-template-columns: 100px 1fr; }
            .table-left { padding: 12px 10px; font-size: 14px; }
            .table-right { padding: 12px 10px; font-size: 14px; }
            .proof-paper { width: 96%; height: 240px; }
            .paper-seal-red { width: 56px; height: 56px; font-size: 10px; }
            .qrcode-demo { width: 34px; height: 34px; }
            .success-text-box,
            .fail-text-box,
            .loading-text-box { font-size: 14px; }
            .tel-notice { font-size: 14px; padding: 14px 12px; }
            .footer-info { font-size: 13px; padding: 8px 12px 24px; }
        }

        @media (max-width: 360px) {
            .table-row { grid-template-columns: 85px 1fr; }
            .table-left { padding: 10px 8px; font-size: 12px; }
            .table-right { padding: 10px 8px; font-size: 12px; }
            .logo-main-text { font-size: 18px; }
            .page-title { font-size: 16px; }
        }
    </style>
</head>

        <div class="table-row">

        <!-- 学工号 -->

            <div class="table-right" id="val-studentId">T07097</div>
        </div>
        <!-- 数据核实行 -->
        <div class="table-row">
            <div class="table-left">数据核实</div>
            <div class="table-right proof-preview-box">
                <div class="proof-paper" id="proofPaper">
                    <div class="paper-watermark"></div>
                    <div class="paper-inner" id="paperInner">
                        <div style="text-align:center; font-size:13px; line-height:1.5; position:relative; z-index:3;">
                            <span style="color:#c8102e; font-weight:bold;" id="previewCollege">福州大学</span><br>
                            <span id="previewDocType">在编在岗证明</span>

        <div class="table-row" id="resultRow">
            <div class="table-left">查询结果</div>
            <div class="table-right success-text-box" id="resultBox">
                <span class="green-dot" id="resultIcon">✓</span>
                <span id="resultMsg">查询通过，请进一步核对文件内容信息.</span>

    <!-- 页面底部技术支持文字 -->
    <div class="footer-info">技术支持:信息中心</div>

    <script>
    (function() {
        'use strict';

        // ==================== 配置 ====================
        // 后端 API 地址：替换为你的真实接口
        var API_BASE = 'https://your-api-server.com/api';
        var VERIFY_ENDPOINT = API_BASE + '/verify';

        // 图片资源 URL（可按需替换真实证明文件预览图）
        var PROOF_IMAGE_URL = '';       // 真实证明文件预览图

        // ==================== 图片替换 ====================
        function applyImages() {
            // 按需求：标题下方不再加载任何横幅图片，避免出现灰底/随机图片。

            // 证明预览图（在 paper-inner 中叠放真实证明图）
            if (PROOF_IMAGE_URL) {
                var inner = document.getElementById('paperInner');
                var proofImg = document.createElement('img');
                proofImg.className = 'proof-real-img';
                proofImg.src = PROOF_IMAGE_URL;
                proofImg.alt = '证明预览';
                proofImg.onerror = function() { proofImg.remove(); };
                inner.appendChild(proofImg);
            }
        }
        applyImages();

        // ==================== URL 参数读取 ====================
        function getQueryParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        // ==================== 填充表格 ====================
        function fillTable(data) {
            document.getElementById('val-fileNo').textContent      = data.fileNo      || '----';
            document.getElementById('val-fileName').textContent    = data.fileName    || '----';
            document.getElementById('val-printDate').textContent   = data.printDate   || '----';
            document.getElementById('val-studentName').textContent = data.studentName || '----';
            document.getElementById('val-studentId').textContent   = data.studentId   || '----';
            // 预览区文字
            if (data.college) document.getElementById('previewCollege').textContent = data.college;
            if (data.docType) document.getElementById('previewDocType').textContent = data.docType;
        }

        // ==================== 结果状态切换 ====================
        function setResult(status, message) {
            var box = document.getElementById('resultBox');
            var icon = document.getElementById('resultIcon');
            var msg = document.getElementById('resultMsg');

            // 清除所有状态 class
            box.className = 'table-right';

            if (status === 'success') {
                box.classList.add('success-text-box');
                icon.className = 'green-dot';
                icon.textContent = '✓';
                msg.textContent = message || '查询通过，请进一步核对文件内容信息.';
            } else if (status === 'fail') {
                box.classList.add('fail-text-box');
                icon.className = 'red-dot';
                icon.textContent = '✗';
                msg.textContent = message || '查询未通过，未找到对应文件信息。';
            } else if (status === 'loading') {
                box.classList.add('loading-text-box');
                icon.className = 'gray-dot';
                icon.textContent = '…';
                msg.textContent = message || '正在查询，请稍候…';
            }
        }

        // ==================== API 调用 ====================
        async function queryVerifyData(queryCode) {
            if (!queryCode) {
                useDemoData('202610032775');
                return;
            }

            setResult('loading');

            try {
                var response = await fetch(VERIFY_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: queryCode, timestamp: Date.now() })
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);

                var result = await response.json();

                if (result.success && result.data) {
                    fillTable(result.data);
                    setResult('success', result.message || '查询通过，请进一步核对文件内容信息.');
                } else {
                    fillTable({});
                    setResult('fail', result.message || '查询未通过，未找到对应文件信息。');
                }
            } catch (err) {
                console.error('API 请求失败:', err);
                // 后端未配置时使用演示数据
                if (API_BASE.indexOf('your-api-server') !== -1) {
                    useDemoData(queryCode);
                } else {
                    fillTable({});
                    setResult('fail', '网络请求失败，请稍后重试。');
                }
            }
        }

        // ==================== 演示数据（后端未配置时自动使用） ====================
        function useDemoData(code) {
            fillTable({
                fileNo:      code || '202610032775',
                fileName:    '在编在岗证明',
                printDate:   '2026-06-05 17:51:22',
                studentName: '陈纾',
                studentId:   'T07097',
                college:     '福州大学',
                docType:     '在编在岗证明'
            });
            setResult('success', '查询通过，请进一步核对文件内容信息.');
            console.warn('⚠️ 演示模式：请将 API_BASE 替换为真实后端地址。');
        }

        // ==================== 入口 ====================
        var queryCode = getQueryParam('code') || getQueryParam('id') || getQueryParam('fileNo');
        queryVerifyData(queryCode);

        // ==================== WeChat JS-SDK 兼容 ====================
        if (typeof window.WeixinJSBridge !== 'undefined') {
            document.addEventListener('WeixinJSBridgeReady', function() {
                console.log('WeChat environment detected');
            }, false);
        }
    })();
    </script>
