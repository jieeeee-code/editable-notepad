<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <title>扫码验证</title>
  <style>
    @charset "UTF-8";
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, p, h1, h2, h3, h4, h5, h6, ul, li, dl, dd, dt, table, tr, th, td, button { margin: 0; padding: 0; }
    html { width: 100%; min-height: 100%; background: #f5f5f5; -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100%;
      color: rgba(0, 0, 0, .87);
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      -webkit-overflow-scrolling: touch;
    }
    img { border: 0; vertical-align: middle; }
    button { border: 0; outline: none; background: none; color: inherit; font: inherit; }

    /* 750rpx 原站尺寸体系：手机端 750rpx = 100vw；电脑端锁定为 375px H5 预览宽度。 */
    :root { --rpx: calc(100vw / 750); }
    @media (min-width: 376px) { :root { --rpx: .5px; } }

    .h5-page {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f5f5f5;
      overflow-x: hidden;
    }

    .v-content { width: 100%; min-height: 100vh; background: #f5f5f5; }

    .v-header {
      height: calc(88 * var(--rpx));
      line-height: calc(88 * var(--rpx));
      background: #fff;
      text-align: center;
      position: relative;
      color: #333;
      font-size: calc(32 * var(--rpx));
      font-family: STKaiti, KaiTi, "Kaiti SC", "Noto Serif CJK SC", serif;
      letter-spacing: calc(2 * var(--rpx));
      border-bottom: calc(1 * var(--rpx)) solid #f2f2f2;
      display: block;
    }
    .v-header .back {
      position: absolute;
      left: calc(24 * var(--rpx));
      top: 0;
      width: calc(60 * var(--rpx));
      height: 100%;
    }
    .v-header .back::before {
      content: "";
      position: absolute;
      width: calc(18 * var(--rpx));
      height: calc(18 * var(--rpx));
      border-left: calc(2 * var(--rpx)) solid #333;
      border-bottom: calc(2 * var(--rpx)) solid #333;
      transform: rotate(45deg);
      top: calc(34 * var(--rpx));
      left: calc(12 * var(--rpx));
    }


    .header {
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: calc(36 * var(--rpx));
      padding-top: calc(30 * var(--rpx));
      padding-bottom: calc(30 * var(--rpx));
      font-family: STKaiti, KaiTi, "Kaiti SC", serif;
      background: #f5f5f5;
      color: #222;
    }
    .header .logo {
      width: calc(70 * var(--rpx));
      height: calc(70 * var(--rpx));
      margin-right: calc(26 * var(--rpx));
      object-fit: contain;
      flex: none;
    }
    .header .text { line-height: 1.2; white-space: nowrap; }

    .anti-banner {
      width: 100%;
      height: calc(100 * var(--rpx));
      background: url("anti-background.png") no-repeat center center / cover;
    }

    .main {
      background: #fff;
      width: calc(690 * var(--rpx));
      margin: auto;
      margin-top: calc(30 * var(--rpx));
      font-size: calc(20 * var(--rpx));
      color: rgba(0,0,0,.87);
      position: relative;
    }
    .main .title {
      background: #3e4b83;
      color: #fff;
      line-height: calc(70 * var(--rpx));
      padding-left: calc(40 * var(--rpx));
      font-size: calc(20 * var(--rpx));
    }
    .main .table,
    .main .foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      line-height: calc(70 * var(--rpx));
      border-bottom: calc(1 * var(--rpx)) solid #e8e8e8;
      border-left: calc(1 * var(--rpx)) solid #e8e8e8;
      border-right: calc(1 * var(--rpx)) solid #e8e8e8;
      min-height: calc(70 * var(--rpx));
      background: #fff;
    }
    .main .table .label,
    .main .foot .label {
      flex: none;
      width: calc(220 * var(--rpx));
      text-align: center;
      border-right: calc(1 * var(--rpx)) solid #e8e8e8;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,0,0,.87);
    }
    .main .table .value,
    .main .foot .value {
      width: 100%;
      padding-left: calc(40 * var(--rpx));
      padding-right: calc(18 * var(--rpx));
      word-break: break-all;
      color: rgba(0,0,0,.87);
    }
    .main .table .value .headline,
    .main .foot .value .headline { position: relative; display: inline-block; }
    .main .table .value .headline::before,
    .main .foot .value .headline::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: calc(-16 * var(--rpx));
      margin: auto;
      width: calc(12 * var(--rpx));
      height: calc(12 * var(--rpx));
      border-radius: 50%;
    }
    .main .table .value .headline.success,
    .main .foot .value .headline.success { color: #00a527; }
    .main .table .value .headline.success::before,
    .main .foot .value .headline.success::before { background: #00a527; }
    .main .table .value .headline.error,
    .main .foot .value .headline.error { color: #f13b10; }
    .main .table .value .headline.error::before,
    .main .foot .value .headline.error::before { background: #f13b10; }

    .proof-table { align-items: flex-start; }
    .proof-table .label { line-height: calc(70 * var(--rpx)); }
    .proof-table .value {
      padding-top: calc(16 * var(--rpx));
      padding-bottom: calc(16 * var(--rpx));
      line-height: 1;
    }
    .u-album { display: flex; flex-direction: column; }
    .u-album__row { display: flex; flex-direction: row; flex-wrap: wrap; }
    .u-album__row__wrapper { position: relative; cursor: pointer; }
    .u-album__img {
      display: block;
      width: calc(280 * var(--rpx));
      height: auto;
      max-height: calc(430 * var(--rpx));
      object-fit: contain;
      background: #fff;
      border: calc(1 * var(--rpx)) solid #efefef;
      user-select: none;
      -webkit-user-drag: none;
    }
    .u-album__row__wrapper:active { opacity: .82; }

    .main .foot { justify-content: center; text-align: center; padding: 0 calc(16 * var(--rpx)); }
    .main .foot .foot-text { line-height: calc(70 * var(--rpx)); }
    .footer {
      color: #666;
      font-size: calc(20 * var(--rpx));
      text-align: center;
      padding-top: calc(30 * var(--rpx));
      padding-bottom: calc(40 * var(--rpx));
    }

    .img-lightbox {
      display: none;
      position: fixed;
      z-index: 99999;
      inset: 0;
      background: rgba(0, 0, 0, .92);
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity .18s ease;
    }
    .img-lightbox.show { display: flex; opacity: 1; visibility: visible; }
    .img-lightbox__wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    .img-lightbox img {
      max-width: 94vw;
      max-height: 92vh;
      object-fit: contain;
      transform: translate3d(0,0,0) scale(1);
      transform-origin: center center;
      transition: transform .08s linear;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
    }
    .img-lightbox.dragging img { transition: none; }
    .img-lightbox__close {
      position: fixed;
      top: max(calc(28 * var(--rpx)), env(safe-area-inset-top));
      right: calc(28 * var(--rpx));
      z-index: 100000;
      width: calc(64 * var(--rpx));
      height: calc(64 * var(--rpx));
      line-height: calc(58 * var(--rpx));
      border-radius: 50%;
      background: rgba(255,255,255,.16);
      color: #fff;
      font-size: calc(48 * var(--rpx));
      text-align: center;
      cursor: pointer;
    }
    .img-lightbox__hint {
      position: fixed;
      bottom: max(calc(34 * var(--rpx)), env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,.75);
      font-size: calc(22 * var(--rpx));
      line-height: 1.4;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="h5-page">
    <main class="v-content" data-page="anti-counterfeit">
      <div class="v-header"><span class="back"></span><span>扫码验证</span></div>

      <div class="header" data-v-0071bd84>
        <img class="logo" src="logo.png" alt="logo" />
        <div class="text">校级防伪验证中心</div>
      </div>

      <div class="anti-banner" role="img" aria-label="防伪验证横幅"></div>

      <div class="main" data-v-0071bd84>
        <div class="title">查询结果</div>
        <div class="table"><div class="label">文件编号</div><div class="value">202607062327</div></div>
        <div class="table"><div class="label">文件名称</div><div class="value">在编在岗证明</div></div>
        <div class="table"><div class="label">打印日期</div><div class="value">2026-06-25 11:36:52</div></div>
        <div class="table"><div class="label">学生姓名</div><div class="value">余发</div></div>
        <div class="table"><div class="label">学工号</div><div class="value">T07086</div></div>
        <div class="table proof-table"><div class="label">数据核实</div><div class="value"><div class="u-album"><div class="u-album__row"><div class="u-album__row__wrapper" id="proof-trigger"><img class="u-album__img" src="333.jpg" alt="数据核实图片" /></div></div></div></div></div>
        <div class="table"><div class="label">查询结果</div><div class="value"><div class="headline success">查询通过，请进一步核对文件内容信息。</div></div></div>
        <div class="foot"><div class="foot-text">进一步核实,请拨打电话0591-22865284</div></div>
      </div>
      <div class="footer">技术支持:信息中心</div>
    </main>
  </div>

  <div class="img-lightbox" id="img-lightbox" aria-hidden="true">
    <button class="img-lightbox__close" id="img-lightbox-close" aria-label="关闭预览">×</button>
    <div class="img-lightbox__wrap" id="img-lightbox-wrap">
      <img id="img-lightbox-img" alt="数据核实图片预览" />
    </div>
    <div class="img-lightbox__hint">双击放大 / 双指缩放 / 点击空白关闭</div>
  </div>

  <script>
    (function () {
      var trigger = document.getElementById('proof-trigger');
      var lightbox = document.getElementById('img-lightbox');
      var closeBtn = document.getElementById('img-lightbox-close');
      var wrap = document.getElementById('img-lightbox-wrap');
      var img = document.getElementById('img-lightbox-img');
      var source = '333.jpg';

      var state = { scale: 1, x: 0, y: 0, startX: 0, startY: 0, startScale: 1, lastTap: 0 };
      var pointers = new Map();
      var prevHtmlOverflow = '';
      var prevBodyOverflow = '';
      var activePointerIds = new Set();

      function clampScale(v) { return Math.max(1, Math.min(5, v)); }
      function applyTransform() { img.style.transform = 'translate3d(' + state.x + 'px,' + state.y + 'px,0) scale(' + state.scale + ')'; }
      function resetTransform() { state.scale = 1; state.x = 0; state.y = 0; state.startX = 0; state.startY = 0; state.startScale = 1; applyTransform(); }
      function distance(a, b) { var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY; return Math.sqrt(dx * dx + dy * dy); }
      function midpoint(a, b) { return { clientX: (a.clientX + b.clientX) / 2, clientY: (a.clientY + b.clientY) / 2 }; }
      function releaseCaptures() {
        activePointerIds.forEach(function (id) {
          try { if (img.releasePointerCapture) img.releasePointerCapture(id); } catch (e) {}
        });
        activePointerIds.clear();
      }
      function openLightbox() {
        prevHtmlOverflow = document.documentElement.style.overflow || '';
        prevBodyOverflow = document.body.style.overflow || '';
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
        img.src = source;
        resetTransform();
        lightbox.style.display = 'flex';
        requestAnimationFrame(function () {
          lightbox.classList.add('show');
          lightbox.setAttribute('aria-hidden', 'false');
        });
      }
      function closeLightbox() {
        releaseCaptures();
        pointers.clear();
        lightbox.classList.remove('dragging');
        lightbox.classList.remove('show');
        lightbox.setAttribute('aria-hidden', 'true');
        document.documentElement.style.overflow = prevHtmlOverflow;
        document.body.style.overflow = prevBodyOverflow;
        setTimeout(function () {
          if (!lightbox.classList.contains('show')) {
            lightbox.style.display = 'none';
            img.removeAttribute('src');
            resetTransform();
          }
        }, 190);
      }

      trigger.addEventListener('click', openLightbox);
      closeBtn.addEventListener('click', function (e) { e.stopPropagation(); closeLightbox(); });
      lightbox.addEventListener('click', function (e) { if (e.target === lightbox || e.target === wrap) closeLightbox(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && lightbox.classList.contains('show')) closeLightbox(); });

      img.addEventListener('wheel', function (e) {
        if (!lightbox.classList.contains('show')) return;
        e.preventDefault();
        var old = state.scale;
        var next = clampScale(old + (e.deltaY < 0 ? 0.18 : -0.18));
        if (next === 1) { state.x = 0; state.y = 0; }
        state.scale = next;
        applyTransform();
      }, { passive: false });

      img.addEventListener('dblclick', function (e) {
        e.preventDefault();
        if (state.scale > 1) resetTransform();
        else { state.scale = 2.2; state.x = 0; state.y = 0; applyTransform(); }
      });

      img.addEventListener('pointerdown', function (e) {
        if (!lightbox.classList.contains('show')) return;
        pointers.set(e.pointerId, e);
        try { if (img.setPointerCapture) { img.setPointerCapture(e.pointerId); activePointerIds.add(e.pointerId); } } catch (err) {}
        lightbox.classList.add('dragging');
        if (pointers.size === 1) { state.startX = e.clientX - state.x; state.startY = e.clientY - state.y; }
        if (pointers.size === 2) {
          var arr = Array.from(pointers.values());
          state.startDistance = distance(arr[0], arr[1]);
          state.startScale = state.scale;
          state.startMid = midpoint(arr[0], arr[1]);
        }
      });
      img.addEventListener('pointermove', function (e) {
        if (!pointers.has(e.pointerId)) return;
        e.preventDefault();
        pointers.set(e.pointerId, e);
        var arr = Array.from(pointers.values());
        if (arr.length === 1 && state.scale > 1) {
          state.x = e.clientX - state.startX;
          state.y = e.clientY - state.startY;
          applyTransform();
        } else if (arr.length >= 2) {
          var d = distance(arr[0], arr[1]);
          var m = midpoint(arr[0], arr[1]);
          state.scale = clampScale(state.startScale * (d / (state.startDistance || d)));
          state.x += (m.clientX - (state.startMid ? state.startMid.clientX : m.clientX)) * 0.05;
          state.y += (m.clientY - (state.startMid ? state.startMid.clientY : m.clientY)) * 0.05;
          applyTransform();
        }
      }, { passive: false });
      function pointerEnd(e) {
        pointers.delete(e.pointerId);
        activePointerIds.delete(e.pointerId);
        try { if (img.releasePointerCapture) img.releasePointerCapture(e.pointerId); } catch (err) {}
        if (pointers.size === 0) {
          lightbox.classList.remove('dragging');
          if (state.scale <= 1.02) resetTransform();
          var now = Date.now();
          if (now - state.lastTap < 280) { state.scale = state.scale > 1 ? 1 : 2.2; state.x = 0; state.y = 0; applyTransform(); }
          state.lastTap = now;
        }
      }
      img.addEventListener('pointerup', pointerEnd);
      img.addEventListener('pointercancel', pointerEnd);
      img.addEventListener('pointerleave', function (e) { if (pointers.has(e.pointerId)) pointerEnd(e); });
    })();
  </script>
</body>
</html>
